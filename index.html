<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Showcase | 你的应用名称</title>
    <style>
        :root {
            --apple-black: #1d1d1f;
            --apple-white: #ffffff;
            --apple-grey: #86868b;
            --apple-blue: #0071e3;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--apple-white);
            color: var(--apple-black);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* 导航栏 - 毛玻璃效果 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 48px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        nav a {
            color: var(--apple-black);
            text-decoration: none;
            font-size: 12px;
            opacity: 0.8;
            margin: 0 20px;
            transition: opacity 0.3s;
        }

        nav a:hover { opacity: 1; }

        /* 主视区 */
        .hero {
            padding-top: 120px;
            text-align: center;
            max-width: 980px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 600;
            letter-spacing: -0.005em;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 24px;
            color: var(--apple-grey);
            margin-bottom: 30px;
        }

        /* 模拟截图展示 */
        .screenshot-container {
            margin-top: 50px;
            perspective: 1000px;
        }

        .mockup {
            width: 300px;
            height: 600px;
            background: #f5f5f7;
            border: 12px solid #333;
            border-radius: 40px;
            margin: 0 auto;
            box-shadow: 0 50px 100px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            background-image: url('https://via.placeholder.com');
            background-size: cover;
        }

        /* 下载按钮 */
        .cta-button {
            display: inline-block;
            background: var(--apple-black);
            color: white;
            padding: 12px 30px;
            border-radius: 980px;
            text-decoration: none;
            font-weight: 500;
            font-size: 17px;
            margin-top: 40px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cta-button:hover {
            transform: scale(1.05);
            background: #333;
        }

        /* 页脚 */
        footer {
            background: #f5f5f7;
            padding: 60px 20px;
            margin-top: 100px;
            font-size: 12px;
            color: var(--apple-grey);
            text-align: center;
        }

        .footer-links {
            margin-top: 20px;
        }

        .footer-links a {
            color: var(--apple-grey);
            margin: 0 10px;
            text-decoration: none;
        }

        @media (max-width: 734px) {
            .hero h1 { font-size: 40px; }
            .hero p { font-size: 19px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#">概览</a>
        <a href="#features">功能</a>
        <a href="#support">支持</a>
    </nav>

    <section class="hero">
        <h1>一款改变一切的 App</h1>
        <p>简洁、高效，为你而生。</p>
        
        <div class="screenshot-container">
            <!-- 这里使用了随机占位图模拟 App 截图 -->
            <div class="mockup"></div>
        </div>

        <a href="https://apps.apple.com" class="cta-button">在 App Store 下载</a>
    </section>

    <footer id="support">
        <div class="footer-content">
            <p>Copyright © 2026 你的开发者名称. 保留所有权利。</p>
            <div class="footer-links">
                <a href="/privacy-policy">隐私政策</a> | 
                <a href="/support">技术支持</a> | 
                <a href="mailto:support@example.com">联系我们</a>
            </div>
            <p style="margin-top:10px;">随机引用 ID: F9G8H7J6K5L4</p>
        </div>
    </footer>

</body>
</html>
